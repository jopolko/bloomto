<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="BloomTO Multiplex Readiness — sortable listing of Toronto parcels ranked for as-of-right multiplex development.">
    <meta name="theme-color" content="#2f6a4f">
    <title>BloomTO Parcels — Multiplex Readiness</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #f6faf6 0%, #eaf3ec 30%, #def0e3 60%, #eaf3ec 100%);
            background-size: 300% 300%;
            animation: gradientShift 18s ease infinite;
            min-height: 100vh;
            color: #1f2937;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        h1, h2, h3 { font-family: 'Poppins', system-ui, sans-serif; }
        .glass-card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 28px rgba(31, 65, 49, 0.08);
            border-radius: 16px;
        }
        .gradient-text {
            background: linear-gradient(135deg, #2f6a4f 0%, #4f9d7d 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .chip {
            padding: 6px 14px;
            border-radius: 999px;
            border: 1.5px solid rgba(47, 106, 79, 0.18);
            background: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
            white-space: nowrap;
        }
        .chip:hover { border-color: #2f6a4f; }
        .chip.active {
            background: linear-gradient(135deg, #2f6a4f 0%, #4f9d7d 100%);
            color: white;
            border-color: transparent;
        }
        .search-input {
            border: 1.5px solid rgba(47, 106, 79, 0.18);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 14px;
            outline: none;
            background: rgba(255, 255, 255, 0.85);
            transition: border-color 0.15s ease;
            width: 100%;
        }
        .search-input:focus { border-color: #2f6a4f; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        thead th {
            background: rgba(47, 106, 79, 0.06);
            color: #1f4131;
            font-weight: 600;
            text-align: left;
            padding: 10px 12px;
            cursor: pointer;
            user-select: none;
            border-bottom: 2px solid rgba(47, 106, 79, 0.15);
            white-space: nowrap;
            position: sticky;
            top: 0;
            z-index: 1;
        }
        thead th:hover { background: rgba(47, 106, 79, 0.10); }
        thead th .arrow { font-size: 10px; opacity: 0.5; margin-left: 4px; }
        thead th.sorted .arrow { opacity: 1; color: #2f6a4f; }
        tbody tr { border-bottom: 1px solid rgba(47, 106, 79, 0.06); }
        tbody tr:hover { background: rgba(47, 106, 79, 0.04); }
        tbody td { padding: 8px 12px; vertical-align: middle; }
        .score-pill {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 999px;
            font-weight: 600;
            font-size: 12px;
            color: white;
            min-width: 36px;
            text-align: center;
        }
        .score-high { background: linear-gradient(135deg, #2f6a4f 0%, #4f9d7d 100%); }
        .score-mid  { background: linear-gradient(135deg, #b8893a 0%, #d6a857 100%); }
        .score-low  { background: linear-gradient(135deg, #6b7280 0%, #9ca3af 100%); }
        .heritage-tag {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 6px;
            font-weight: 500;
        }
        .heritage-part_iv { background: #fee2e2; color: #991b1b; }
        .heritage-part_v  { background: #fef3c7; color: #92400e; }
        .heritage-listed  { background: #dbeafe; color: #1e40af; }
        .heritage-none    { color: #6b7280; }
        .bloom-badge { font-size: 16px; }
        .map-link {
            color: #2f6a4f;
            text-decoration: none;
            font-weight: 500;
            font-size: 12px;
        }
        .map-link:hover { text-decoration: underline; }
        .table-wrap { max-height: calc(100vh - 360px); overflow: auto; border-radius: 12px; }
        .muted { color: #9ca3af; }
    </style>
</head>
<body>
    <header class="px-6 py-5 mb-6" style="background: rgba(255,255,255,0.95); backdrop-filter: blur(28px); border-bottom: 1px solid rgba(47, 106, 79, 0.08);">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div>
                <h1 class="text-2xl font-bold gradient-text">BloomTO Parcels</h1>
                <p class="text-sm text-gray-600 mt-0.5">Multiplex Readiness · sortable listing</p>
            </div>
            <a href="index.html" class="text-sm text-gray-600 hover:text-gray-900">← Neighborhoods</a>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 pb-12">
        <div class="glass-card p-5 mb-5">
            <div class="flex flex-wrap gap-3 items-center mb-4">
                <input id="search" class="search-input flex-1" style="min-width: 240px; max-width: 380px;"
                       placeholder="Search address or neighborhood…" type="text">
                <div id="chips" class="flex gap-2 flex-wrap">
                    <!-- filter chips injected by JS -->
                </div>
            </div>
            <div id="stats" class="text-sm text-gray-600">Loading…</div>
        </div>

        <div class="glass-card overflow-hidden">
            <div class="table-wrap">
                <table id="grid">
                    <thead><tr id="head"></tr></thead>
                    <tbody id="body"></tbody>
                </table>
            </div>
        </div>

        <p class="text-xs text-gray-500 mt-4" id="provenance"></p>
    </main>

    <script>
    (function() {
        // ---- Column definitions ----
        // key: row field; label: header; numeric: sort as number; render: cell HTML
        const COLUMNS = [
            { key: 'rank',        label: '#',           numeric: true,  width: 50,  render: (_, i) => `<span class="muted">${i+1}</span>` },
            { key: 'address',     label: 'Address',                     render: r => r.address ?? '<span class="muted">—</span>' },
            { key: 'neighborhood',label: 'Neighborhood',                render: r => r.neighborhood },
            { key: 'score',       label: 'Score',       numeric: true,  render: r => scorePill(r.score) },
            { key: 'maxUnits',    label: 'Units',       numeric: true,  render: r => r.maxUnits },
            { key: 'lotAreaM2',   label: 'Lot (m²)',    numeric: true,  render: r => r.lotAreaM2 == null ? '<span class="muted">—</span>' : r.lotAreaM2.toLocaleString() },
            { key: 'heritageStatus', label: 'Heritage',                 render: r => heritageTag(r.heritageStatus) },
            { key: 'distSubwayM', label: 'Subway (m)',  numeric: true,  render: r => fmtDist(r.distSubwayM) },
            { key: 'solarScore',  label: 'Solar',       numeric: true,  render: r => r.solarScore == null ? '<span class="muted">—</span>' : r.solarScore },
            { key: 'bloom',       label: '🌸',           numeric: true,  render: r => r.bloom ? '<span class="bloom-badge">🌸</span>' : '' },
            { key: 'map',         label: 'Map',                         render: r => `<a class="map-link" target="_blank" rel="noopener" href="https://www.google.com/maps/search/?api=1&query=${r.lat},${r.lng}">Open ↗</a>` },
        ];

        // ---- Filter presets ----
        // Each: { id, label, predicate(row) -> bool }
        const PRESETS = [
            { id: 'all',           label: 'All',              fn: () => true },
            { id: 'heritageFree',  label: 'Heritage-free',    fn: r => r.heritageStatus == null },
            { id: 'transit',       label: 'Transit Goldmines',fn: r => r.distSubwayM < 500 },
            { id: 'easy',          label: 'Easy Wins',        fn: r => r.heritageStatus == null && r.buildingCoverageRatio < 0.4 && r.distSubwayStreetcarM < 500 },
            { id: 'bloom',         label: 'Bloom 🌸',         fn: r => r.bloom === true },
        ];

        // ---- State ----
        let allRows = [];
        let payload = null;
        let activePreset = 'all';
        let searchQuery = '';
        let sortKey = 'score';
        let sortDir = 'desc';
        const VISIBLE_CAP = 200;

        // ---- Helpers ----
        function scorePill(s) {
            const cls = s >= 70 ? 'score-high' : s >= 40 ? 'score-mid' : 'score-low';
            return `<span class="score-pill ${cls}">${s}</span>`;
        }
        function heritageTag(h) {
            if (h == null) return '<span class="heritage-none">—</span>';
            const labels = { part_iv: 'Part IV', part_v: 'Part V', listed: 'Listed' };
            return `<span class="heritage-tag heritage-${h}">${labels[h] ?? h}</span>`;
        }
        function fmtDist(m) { return m >= 5000 ? '5,000+' : m.toLocaleString(); }

        function applyFilters() {
            const preset = PRESETS.find(p => p.id === activePreset).fn;
            const q = searchQuery.trim().toLowerCase();
            return allRows.filter(r => {
                if (!preset(r)) return false;
                if (!q) return true;
                return (r.address || '').toLowerCase().includes(q)
                    || (r.neighborhood || '').toLowerCase().includes(q);
            });
        }

        function applySort(rows) {
            if (sortKey === 'rank' || sortKey === 'map') return rows;
            const col = COLUMNS.find(c => c.key === sortKey);
            const dir = sortDir === 'asc' ? 1 : -1;
            return rows.slice().sort((a, b) => {
                let av = a[sortKey], bv = b[sortKey];
                // Nulls always last
                if (av == null && bv == null) return 0;
                if (av == null) return 1;
                if (bv == null) return -1;
                if (col && col.numeric) return (av - bv) * dir;
                return String(av).localeCompare(String(bv)) * dir;
            });
        }

        function renderHead() {
            const head = document.getElementById('head');
            head.innerHTML = COLUMNS.map(c => {
                const sorted = c.key === sortKey ? 'sorted' : '';
                const arrow = c.key === sortKey ? (sortDir === 'asc' ? '▲' : '▼') : '▾';
                const w = c.width ? `style="width:${c.width}px"` : '';
                return `<th data-key="${c.key}" class="${sorted}" ${w}>${c.label}<span class="arrow">${arrow}</span></th>`;
            }).join('');
            head.querySelectorAll('th').forEach(th => {
                th.addEventListener('click', () => {
                    const k = th.dataset.key;
                    if (k === 'map') return;
                    if (sortKey === k) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
                    else { sortKey = k; sortDir = COLUMNS.find(c => c.key === k).numeric ? 'desc' : 'asc'; }
                    render();
                });
            });
        }

        function renderBody(rows) {
            const body = document.getElementById('body');
            const visible = rows.slice(0, VISIBLE_CAP);
            body.innerHTML = visible.map((r, i) =>
                '<tr>' + COLUMNS.map(c => `<td>${c.render(r, i)}</td>`).join('') + '</tr>'
            ).join('');
        }

        function renderStats(filteredCount) {
            const stats = document.getElementById('stats');
            const shown = Math.min(filteredCount, VISIBLE_CAP);
            const total = payload.totalAvailable;
            const inFile = payload.topN;
            const cap = filteredCount > VISIBLE_CAP
                ? ` (showing first ${VISIBLE_CAP})` : '';
            stats.innerHTML = `<strong>${filteredCount.toLocaleString()}</strong> matches${cap} · `
                + `${inFile.toLocaleString()} loaded of ${total.toLocaleString()} eligible parcels citywide`;
        }

        function renderChips() {
            const wrap = document.getElementById('chips');
            wrap.innerHTML = PRESETS.map(p =>
                `<button class="chip ${p.id === activePreset ? 'active' : ''}" data-id="${p.id}">${p.label}</button>`
            ).join('');
            wrap.querySelectorAll('.chip').forEach(btn => {
                btn.addEventListener('click', () => {
                    activePreset = btn.dataset.id;
                    render();
                });
            });
        }

        function render() {
            const filtered = applyFilters();
            const sorted = applySort(filtered);
            renderHead();
            renderChips();
            renderBody(sorted);
            renderStats(filtered.length);
        }

        // ---- Boot ----
        fetch('data/parcels-top.json', { cache: 'default' })
            .then(r => {
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
                return r.json();
            })
            .then(p => {
                payload = p;
                allRows = p.rows;
                document.getElementById('search').addEventListener('input', e => {
                    searchQuery = e.target.value;
                    render();
                });
                document.getElementById('provenance').textContent =
                    `Generated ${p.generatedAt} · top ${p.topN.toLocaleString()} of ${p.totalAvailable.toLocaleString()} score-positive parcels`;
                render();
            })
            .catch(err => {
                document.getElementById('stats').innerHTML =
                    `<span style="color:#991b1b">Failed to load <code>data/parcels-top.json</code>: ${err.message}. ` +
                    `Run <code>python3 tools/build_parcels_top.py</code> first.</span>`;
            });
    })();
    </script>
</body>
</html>
